openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Wedding booking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Wedding services
  - name: bookings
    description: Appointment bookings
  - name: gallery
    description: Photo gallery
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all wedding services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/featured:
    get:
      operationId: listFeaturedServices
      tags: [services]
      summary: List featured services for homepage
      responses:
        "200":
          description: Featured services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/summary:
    get:
      operationId: getBookingsSummary
      tags: [bookings]
      summary: Get bookings summary statistics
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingsSummary"

  /bookings/upcoming:
    get:
      operationId: listUpcomingBookings
      tags: [bookings]
      summary: List upcoming confirmed bookings
      responses:
        "200":
          description: Upcoming bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: deleteBooking
      tags: [bookings]
      summary: Delete a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery photos
      responses:
        "200":
          description: Gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"
    post:
      operationId: addGalleryPhoto
      tags: [gallery]
      summary: Add a gallery photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryPhotoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPhoto"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Service:
      type: object
      required: [id, name, description, price, category, featured, imageUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        priceNote:
          type: ["string", "null"]
        category:
          type: string
        featured:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    ServiceInput:
      type: object
      required: [name, description, price, category]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
        priceNote:
          type: string
        category:
          type: string
        featured:
          type: boolean
        imageUrl:
          type: string

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        priceNote:
          type: string
        category:
          type: string
        featured:
          type: boolean
        imageUrl:
          type: string

    Booking:
      type: object
      required: [id, clientName, clientPhone, clientEmail, weddingDate, venue, status, serviceId, notes, createdAt]
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientPhone:
          type: string
        clientEmail:
          type: string
        weddingDate:
          type: string
        venue:
          type: string
        guestCount:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        serviceId:
          type: ["integer", "null"]
        serviceName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        totalPrice:
          type: ["number", "null"]
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [clientName, clientPhone, clientEmail, weddingDate, venue]
      properties:
        clientName:
          type: string
          minLength: 1
        clientPhone:
          type: string
        clientEmail:
          type: string
        weddingDate:
          type: string
        venue:
          type: string
        guestCount:
          type: integer
        serviceId:
          type: integer
        notes:
          type: string

    BookingUpdate:
      type: object
      properties:
        clientName:
          type: string
        clientPhone:
          type: string
        clientEmail:
          type: string
        weddingDate:
          type: string
        venue:
          type: string
        guestCount:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        serviceId:
          type: integer
        notes:
          type: string
        totalPrice:
          type: number

    BookingsSummary:
      type: object
      required: [total, pending, confirmed, cancelled, upcomingThisMonth]
      properties:
        total:
          type: integer
        pending:
          type: integer
        confirmed:
          type: integer
        cancelled:
          type: integer
        upcomingThisMonth:
          type: integer

    GalleryPhoto:
      type: object
      required: [id, imageUrl, title, category]
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        title:
          type: string
        category:
          type: string
        createdAt:
          type: string

    GalleryPhotoInput:
      type: object
      required: [imageUrl, title, category]
      properties:
        imageUrl:
          type: string
        title:
          type: string
        category:
          type: string
